
<html data-type="html" data-identifier="1169158f-0ec5-4209-bfbf-21833c13aa72" data-title="Invoice Generator" data-version="5" width="1000" height="1620" imagemodel="imagen-4"><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Playfair+Display:wght@500;600;700&amp;family=Jost:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1d5a64;
    --teal-deep: #143f47;
    --gold: #bb8a3c;
    --gold-soft: #d2b277;
    --sand: #d9cdb4;
    --ivory: #fdfcf8;
    --ink: #2c2c28;
    --muted: #8f8a7d;
    --line: #e7e1d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Jost', 'Helvetica Neue', Arial, sans-serif;
    background: #e4e3de;
    color: var(--ink);
    padding: 24px;
    line-height: 1.5;
  }
  .toolbar {
    max-width: 800px;
    margin: 0 auto 20px auto;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-end;
  }
  .toolbar button {
    border: none;
    padding: 11px 20px;
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s ease, transform .05s ease;
  }
  .toolbar button:active { transform: translateY(1px); }
  .toolbar button:hover { opacity: .85; }
  .btn-primary { background: var(--teal); color: #fff; }
  .btn-secondary { background: var(--gold); color: #fff; }
  .btn-light { background: #fff; color: var(--teal); border: 1px solid var(--gold-soft); }

  .invoice {
    max-width: 800px;
    margin: 0 auto;
    background: var(--ivory);
    padding: 0 0 56px 0;
    box-shadow: 0 10px 40px rgba(20,63,71,.15);
    border-radius: 2px;
    overflow: hidden;
  }

  /* Header banner with uploaded image (gradient fallback behind) */
  .banner {
    position: relative;
    width: 100%;
    height: 210px;
    overflow: hidden;
    background: linear-gradient(120deg, var(--teal-deep) 0%, var(--teal) 38%, var(--gold-soft) 70%, var(--sand) 100%);
  }
  .banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Wordmark / letterhead */
  .letterhead {
    text-align: center;
    padding: 30px 56px 26px 56px;
    border-bottom: 1px solid var(--line);
  }
  #brand-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--teal);
    text-transform: uppercase;
  }
  .brand-rule {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 12px auto 10px auto;
  }
  #brand-sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .body-pad { padding: 0 56px; }

  .invoice-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 32px 0 20px 0;
    border-bottom: 2px solid var(--gold);
    margin-bottom: 32px;
  }
  #doc-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 40px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--teal);
  }
  .inv-no-wrap { text-align: right; }
  #inv-no-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .inv-no-wrap .hash {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
  }
  .inv-no-wrap input {
    width: 64px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    border: none;
    border-bottom: 1px dashed var(--gold-soft);
    text-align: left;
    color: var(--ink);
    background: transparent;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    margin-bottom: 40px;
  }
  .meta-block { flex: 1; }
  .meta-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
    font-weight: 500;
  }
  .meta-block textarea {
    width: 100%;
    border: 1px solid transparent;
    border-radius: 2px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    color: var(--ink);
    resize: vertical;
    padding: 6px 8px;
    background: rgba(187,138,60,.06);
    min-height: 132px;
  }
  .meta-block input.date-field {
    border: 1px solid transparent;
    background: rgba(187,138,60,.06);
    border-radius: 2px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    padding: 6px 8px;
    width: 100%;
    color: var(--ink);
  }
  textarea:focus, input:focus { outline: none; border-color: var(--teal) !important; background: #fff; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  thead th {
    background: var(--teal);
    color: #fff;
    text-align: left;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 13px 12px;
  }
  thead th.num { text-align: right; }
  thead th.actcol { width: 34px; }
  tbody td { padding: 7px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody td input {
    width: 100%;
    border: 1px solid transparent;
    background: rgba(187,138,60,.06);
    border-radius: 2px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    color: var(--ink);
    padding: 6px;
  }
  td.qty input, td.price input { text-align: right; }
  td.linetotal {
    text-align: right;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    white-space: nowrap;
    color: var(--teal);
  }
  .row-remove {
    border: none;
    background: transparent;
    color: var(--muted);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: 700;
    font-size: 16px;
    line-height: 1;
  }
  .row-remove:hover { background: #f0e3e3; color: #b03030; }

  .totals { display: flex; justify-content: flex-end; margin-top: 18px; }
  .totals-inner { width: 300px; }
  .totals-line {
    display: flex;
    justify-content: space-between;
    padding: 9px 4px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
  }
  .totals-line span:first-child { color: var(--muted); letter-spacing: .5px; }
  .totals-line.grand {
    border-top: 2px solid var(--gold);
    margin-top: 8px;
    font-size: 24px;
    font-weight: 700;
    color: var(--teal);
  }
  .totals-line.grand span:first-child {
    color: var(--teal);
    text-transform: uppercase;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    align-self: center;
  }
  .vat-row input {
    width: 52px;
    text-align: right;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    padding: 2px 4px;
  }

  /* Banking / payment panel */
  .payment-panel {
    margin-top: 44px;
    border: 1px solid var(--gold-soft);
    border-left: 4px solid var(--gold);
    border-radius: 2px;
    background: rgba(187,138,60,.05);
    padding: 22px 26px;
  }
  .payment-panel h3 {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 14px;
  }
  .pay-grid {
    display: grid;
    grid-template-columns: 130px 1fr;
    row-gap: 8px;
    column-gap: 16px;
  }
  .pay-grid .pay-label {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    align-self: center;
  }
  .pay-grid .pay-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--ink);
  }
  .pay-grid .pay-value input {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--ink);
    padding: 3px 5px;
    border-radius: 2px;
  }
  .pay-grid .pay-value input:focus { outline: none; border-color: var(--teal); background: #fff; }
  .pay-grid .payee { font-weight: 600; color: var(--teal); }

  #footer-note {
    margin-top: 44px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
    text-align: center;
  }
  #footer-note input {
    border: 1px solid transparent;
    background: rgba(187,138,60,.06);
    text-align: center;
    width: 80%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--teal);
    border-radius: 2px;
    padding: 6px;
  }

  /* Permanent, non-editable business identity block */
  .business-block {
    margin-top: 22px;
    text-align: center;
  }
  .business-block .biz-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal);
    font-weight: 600;
  }
  .business-block .biz-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 9px auto;
  }
  .business-block .biz-line {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 1.9;
  }

  @media print {
    body { background: #fff; padding: 0; }
    .toolbar { display: none !important; }
    .invoice { box-shadow: none; max-width: 100%; }
    textarea, input { background: transparent !important; border-color: transparent !important; }
    .row-remove { display: none; }
    thead th.actcol, tbody td.actcol { display: none; }
    .vat-row input { border-color: transparent; }
    .payment-panel { background: transparent; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <button class="btn-light" id="add-item-btn">+ Add Item</button>
    <button class="btn-light" id="reset-btn">Reset</button>
    <button class="btn-secondary" id="email-btn">Email Invoice</button>
    <button class="btn-primary" id="pdf-btn">Save as PDF</button>
  </div>

  <div class="invoice" id="invoice">
    <!-- Header banner (uploaded image) with gradient fallback -->
    <div class="banner">
      <img width="1600" height="420" data-src="Abstract aerial macro photograph of mineral-rich hot spring terraces resembling polished agate. Flowing diagonal bands of golden ochre and rust orange form organic honeycomb and cellular bubble clusters across the centre, surrounded by soft sage-green and pale cream mineral crusts, with pools of vivid turquoise and deep teal-blue water toward the edges. Glittering sandy textures and marbled swirling patterns throughout. Natural ethereal fine-art abstract landscape, ultra wide panoramic, no text." alt="Lisa Barchard header">
    </div>

    <!-- Wordmark -->
    <div class="letterhead">
      <div id="brand-name">Lisa Barchard</div>
      <div class="brand-rule"></div>
      <div id="brand-sub">Interiors &amp; Bespoke Décor</div>
    </div>

    <div class="body-pad">
      <div class="invoice-top">
        <h1 id="doc-title">Sales Invoice</h1>
        <div class="inv-no-wrap">
          <p id="inv-no-label">Invoice</p>
          <span class="hash">No.</span><input type="text" id="inv-number" value="08">
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-block">
          <span class="meta-label">Prepared For</span>
          <textarea id="prepared-for">Liz Mc Grath Collection (Pty) Ltd
t/a Cellars Hohenort
VAT number: 4390 109 843
93 Brommesvlei Road
Constantia Heights
Cape Town, 7806</textarea>
        </div>
        <div class="meta-block">
          <span class="meta-label">Prepared Date</span>
          <input type="text" class="date-field" id="prepared-date" value="5 June 2026">
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th class="num" style="width:70px;">Qty</th>
            <th class="num" style="width:120px;">Price</th>
            <th class="num" style="width:120px;">Total</th>
            <th class="actcol"></th>
          </tr>
        </thead>
        <tbody id="items-body">
          <!-- rows injected by JS -->
        </tbody>
      </table>

      <div class="totals">
        <div class="totals-inner">
          <div class="totals-line">
            <span>Subtotal</span>
            <span id="subtotal">R 0</span>
          </div>
          <div class="totals-line vat-row">
            <span>VAT (<input type="number" id="vat-rate" value="0" min="0" max="100">%)</span>
            <span id="vat-amount">R 0</span>
          </div>
          <div class="totals-line grand">
            <span>Total</span>
            <span id="grand-total">R 0</span>
          </div>
        </div>
      </div>

      <!-- Banking / Payment details -->
      <div class="payment-panel">
        <h3>Please Make Payment To</h3>
        <div class="pay-grid">
          <div class="pay-label">Account Name</div>
          <div class="pay-value payee"><input type="text" id="pay-name" value="L. Barchard"></div>

          <div class="pay-label">Acc No</div>
          <div class="pay-value"><input type="text" id="pay-acc" value="121 1089 493"></div>

          <div class="pay-label">Bank</div>
          <div class="pay-value"><input type="text" id="pay-bank" value="Capitec"></div>

          <div class="pay-label">Branch</div>
          <div class="pay-value"><input type="text" id="pay-branch" value="470010"></div>

          <div class="pay-label">Reference</div>
          <div class="pay-value"><input type="text" id="pay-ref" value="Name and Invoice #"></div>
        </div>
      </div>

      <div id="footer-note">
        <input type="text" id="footer-text" value="Thank you for your business.">
      </div>

      <!-- Permanent, non-editable business identity block -->
      <div class="business-block">
        <div class="biz-name">Lisa Barchard</div>
        <div class="biz-divider"></div>
        <div class="biz-line">Unit 3, 6 Park Avenue, Camps Bay, Cape Town</div>
        <div class="biz-line">083 738 8744</div>
      </div>
    </div>
  </div>

<script>
(function () {
  var itemsBody = document.getElementById('items-body');

  function fmt(n) {
    if (isNaN(n)) n = 0;
    return 'R ' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function createRow(item, qty, price) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="item"><input type="text" class="item-input" value="' + (item || '') + '"></td>' +
      '<td class="qty"><input type="number" class="qty-input" min="0" step="1" value="' + (qty != null ? qty : 1) + '"></td>' +
      '<td class="price"><input type="number" class="price-input" min="0" step="0.01" value="' + (price != null ? price : 0) + '"></td>' +
      '<td class="linetotal">R 0</td>' +
      '<td class="actcol"><button type="button" class="row-remove" title="Remove">&times;</button></td>';
    itemsBody.appendChild(tr);
    recalc();
  }

  function recalc() {
    var rows = itemsBody.querySelectorAll('tr');
    var subtotal = 0;
    rows.forEach(function (row) {
      var qty = parseFloat(row.querySelector('.qty-input').value) || 0;
      var price = parseFloat(row.querySelector('.price-input').value) || 0;
      var line = qty * price;
      subtotal += line;
      row.querySelector('.linetotal').textContent = fmt(line);
    });
    var vatRate = parseFloat(document.getElementById('vat-rate').value) || 0;
    var vatAmount = subtotal * (vatRate / 100);
    document.getElementById('subtotal').textContent = fmt(subtotal);
    document.getElementById('vat-amount').textContent = fmt(vatAmount);
    document.getElementById('grand-total').textContent = fmt(subtotal + vatAmount);
  }

  itemsBody.addEventListener('input', recalc);
  document.getElementById('vat-rate').addEventListener('input', recalc);

  itemsBody.addEventListener('click', function (e) {
    if (e.target.classList.contains('row-remove')) {
      e.target.closest('tr').remove();
      recalc();
    }
  });

  document.getElementById('add-item-btn').addEventListener('click', function () {
    createRow('', 1, 0);
  });

  document.getElementById('reset-btn').addEventListener('click', function () {
    itemsBody.innerHTML = '';
    document.getElementById('vat-rate').value = 0;
    createRow('', 1, 0);
  });

  document.getElementById('pdf-btn').addEventListener('click', function () {
    window.print();
  });

  document.getElementById('email-btn').addEventListener('click', function () {
    var invNo = document.getElementById('inv-number').value;
    var preparedFor = document.getElementById('prepared-for').value;
    var date = document.getElementById('prepared-date').value;
    var lines = [];
    itemsBody.querySelectorAll('tr').forEach(function (row) {
      var item = row.querySelector('.item-input').value;
      var qty = row.querySelector('.qty-input').value;
      var price = row.querySelector('.price-input').value;
      var total = row.querySelector('.linetotal').textContent;
      if (item) lines.push('- ' + item + '  |  Qty: ' + qty + '  |  Price: R ' + price + '  |  ' + total);
    });
    var grand = document.getElementById('grand-total').textContent;

    var subject = 'Lisa Barchard | Sales Invoice No. ' + invNo;
    var body =
      'LISA BARCHARD\n' +
      'Interiors & Bespoke Decor\n\n' +
      'SALES INVOICE No. ' + invNo + '\n\n' +
      'Prepared For:\n' + preparedFor + '\n\n' +
      'Prepared Date: ' + date + '\n\n' +
      'Items:\n' + lines.join('\n') + '\n\n' +
      'TOTAL: ' + grand + '\n\n' +
      'PLEASE MAKE PAYMENT TO:\n' +
      document.getElementById('pay-name').value + '\n' +
      'Acc no: ' + document.getElementById('pay-acc').value + '\n' +
      'Bank: ' + document.getElementById('pay-bank').value + '\n' +
      'Branch: ' + document.getElementById('pay-branch').value + '\n' +
      'Reference: ' + document.getElementById('pay-ref').value + '\n\n' +
      document.getElementById('footer-text').value + '\n\n' +
      'Lisa Barchard | Unit 3, 6 Park Avenue, Camps Bay, Cape Town | 083 738 8744';

    window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  });

  createRow('Protea Photo - Framed (LH2505000003)', 1, 1850);
})();
</script>

</body></html>
