
<html data-type="html" data-identifier="1169158f-0ec5-4209-bfbf-21833c13aa72" data-title="Invoice Generator" data-version="14" width="1000" height="1400"><head>

<style>
  :root {

  /* Header banner with hosted image (gradient fallback behind) */

  }

  /* Wordmark / letterhead */
  .letterhead {

  #brand-name {

  #inv-no-label {

  }
  .inv-no-wrap .hash {

  .inv-no-wrap input {

  .meta-row {
    display: flex;

  .meta-block textarea {

  textarea:focus, input:focus { outline: none; border-color: var(--teal) !important; background: #fff; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
  thead th {

    text-align: left;

  tbody td { padding: 5px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }

  tbody tr { break-inside: avoid; page-break-inside: avoid; }
  tbody td input {

  /* Permanent, non-editable business identity block */

  /* ---------- EXPORT MODE (applied to the off-screen clone) ---------- */
  .invoice.exporting { box-shadow: none; }
  .invoice.exporting .payment-panel { background: transparent; }
  .invoice.exporting .row-remove { display: none; }
  .invoice.exporting thead th.actcol,
  .invoice.exporting tbody td.actcol { display: none; }
  .invoice.exporting tbody td { vertical-align: top; }
  .invoice.exporting td.item { overflow: visible; }
  .export-text {
    width: 100%;
    word-break: break-word;
    overflow-wrap: break-word;
    background: transparent;

  /* ---------- PRINT / SAVE-AS-PDF RULES (backup Print button) ---------- */
  @page {

    margin: 12mm;
  }
  @media print {
    html, body { background: #fff; padding: 0; margin: 0; }
    .toolbar { display: none !important; }
    .invoice {
      box-shadow: none;
      max-width: 100%;
      border-radius: 0;
      padding-bottom: 0;
    }
    .banner { height: 34mm; }
    .letterhead { padding: 14px 48px 12px 48px; }
    .body-pad { padding: 0 6mm; }
    .invoice-top { padding: 16px 0 10px 0; margin-bottom: 16px; }
    .meta-row { margin-bottom: 18px; }
    .payment-panel { margin-top: 22px; background: transparent; }
    #footer-note { margin-top: 22px; }
    textarea, input { background: transparent !important; border-color: transparent !important; }
    .row-remove { display: none; }
    thead th.actcol, tbody td.actcol { display: none; }
    thead { display: table-header-group; }
    tfoot { display: table-footer-group; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>

<script>
(function () {
  var itemsBody = document.getElementById('items-body');

  function fmt(n) {
    if (isNaN(n)) n = 0;
    return 'R ' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function createRow(item, qty, price) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="item"><input type="text" class="item-input" value="' + (item || '') + '"></td>' +
      '<td class="qty"><input type="number" class="qty-input" min="0" step="1" value="' + (qty != null ? qty : 1) + '"></td>' +
      '<td class="price"><input type="number" class="price-input" min="0" step="0.01" value="' + (price != null ? price : 0) + '"></td>' +
      '<td class="linetotal">R 0</td>' +
      '<td class="actcol"><button type="button" class="row-remove" title="Remove">&times;</button></td>';
    itemsBody.appendChild(tr);
    recalc();
  }

  function recalc() {
    var rows = itemsBody.querySelectorAll('tr');
    var total = 0;
    rows.forEach(function (row) {
      var qty = parseFloat(row.querySelector('.qty-input').value) || 0;
      var price = parseFloat(row.querySelector('.price-input').value) || 0;
      var line = qty * price;
      total += line;
      row.querySelector('.linetotal').textContent = fmt(line);
    });
    document.getElementById('grand-total').textContent = fmt(total);
  }

  itemsBody.addEventListener('input', recalc);

  itemsBody.addEventListener('click', function (e) {
    if (e.target.classList.contains('row-remove')) {
      e.target.closest('tr').remove();
      recalc();
    }
  });

  document.getElementById('add-item-btn').addEventListener('click', function () {
    createRow('', 1, 0);
  });

  document.getElementById('reset-btn').addEventListener('click', function () {
    itemsBody.innerHTML = '';
    createRow('', 1, 0);
  });

  // ---- Filename builder: recipient_invoice#_DDMMYYYY ----
  function sanitize(str) {
    return (str || '')
      .trim()
      .replace(/[^\w\s-]/g, '')
      .replace(/\s+/g, '_')
      .replace(/_+/g, '_')
      .replace(/^_+|_+$/g, '');
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function formatDateDDMMYYYY(raw) {
    var d = new Date(raw);
    if (isNaN(d.getTime())) { d = new Date(); }
    return pad(d.getDate()) + pad(d.getMonth() + 1) + d.getFullYear();
  }
  function buildFileName() {
    var preparedFor = document.getElementById('prepared-for').value || '';
    var firstLine = preparedFor.split('\n').map(function (l) { return l.trim(); })
                               .filter(function (l) { return l.length; })[0] || 'Invoice';
    var recipient = sanitize(firstLine);
    var invNo = sanitize(document.getElementById('inv-number').value) || 'NA';
    var dateStr = formatDateDDMMYYYY(document.getElementById('prepared-date').value);
    return recipient + '_' + invNo + '_' + dateStr + '.pdf';
  }

  // ---- Build an off-screen clone where inputs become wrapping text ----
  function buildExportClone() {
    var invoice = document.getElementById('invoice');
    var clone = invoice.cloneNode(true);
    clone.classList.add('exporting');
    clone.style.position = 'absolute';
    clone.style.left = '-10000px';
    clone.style.top = '0';
    clone.style.width = invoice.offsetWidth + 'px';
    clone.style.boxShadow = 'none';

    var origFields = invoice.querySelectorAll('input, textarea');
    var cloneFields = clone.querySelectorAll('input, textarea');
    var copyProps = ['fontFamily','fontSize','fontWeight','fontStyle','color',
                     'textAlign','letterSpacing','padding'];

    for (var i = 0; i < origFields.length; i++) {
      var orig = origFields[i];
      var cf = cloneFields[i];
      var cs = window.getComputedStyle(orig);
      var div = document.createElement('div');
      div.className = 'export-text';
      div.textContent = orig.value;
      for (var p = 0; p < copyProps.length; p++) {
        div.style[copyProps[p]] = cs[copyProps[p]];
      }
      div.style.lineHeight = '1.5';
      div.style.whiteSpace = (orig.tagName === 'TEXTAREA') ? 'pre-wrap' : 'normal';
      cf.parentNode.replaceChild(div, cf);
    }
    return clone;
  }

  // ---- Core: build the jsPDF document, hand it back via callback ----
  function generatePdf(onReady, onError) {
    var clone = buildExportClone();
    document.body.appendChild(clone);

    setTimeout(function () {
      html2canvas(clone, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false,
        imageTimeout: 15000
      }).then(function (canvas) {
        var imgData = canvas.toDataURL('image/jpeg', 0.95);
        var pdf = new window.jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
        var pageWidth = pdf.internal.pageSize.getWidth();
        var pageHeight = pdf.internal.pageSize.getHeight();
        var fullImgHeight = canvas.height * pageWidth / canvas.width;
        var SINGLE_PAGE_MAX = pageHeight * 1.45;

        if (fullImgHeight <= pageHeight + 1) {
          pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, fullImgHeight);
        } else if (fullImgHeight <= SINGLE_PAGE_MAX) {
          var scaledHeight = pageHeight;
          var scaledWidth = canvas.width * scaledHeight / canvas.height;
          var x = (pageWidth - scaledWidth) / 2;
          pdf.addImage(imgData, 'JPEG', x, 0, scaledWidth, scaledHeight);
        } else {
          var heightLeft = fullImgHeight;
          var position = 0;
          pdf.addImage(imgData, 'JPEG', 0, position, pageWidth, fullImgHeight);
          heightLeft -= pageHeight;
          while (heightLeft > 0) {
            position = heightLeft - fullImgHeight;
            pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, position, pageWidth, fullImgHeight);
            heightLeft -= pageHeight;
          }
        }
        if (clone.parentNode) { clone.parentNode.removeChild(clone); }
        onReady(pdf);
      }).catch(function (err) {
        if (clone.parentNode) { clone.parentNode.removeChild(clone); }
        if (onError) { onError(err); }
      });
    }, 80);
  }

  function withBusy(btn, fn) {
    var original = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Generating…';
    fn(function done() {
      btn.disabled = false;
      btn.textContent = original;
    });
  }

  // Backup: native print -> "Save as PDF" destination
  document.getElementById('print-btn').addEventListener('click', function () {
    window.print();
  });

  // Download PDF (desktop-friendly)
  document.getElementById('pdf-btn').addEventListener('click', function () {
    var btn = this;
    var fileName = buildFileName();
    withBusy(btn, function (done) {
      generatePdf(function (pdf) {
        pdf.save(fileName);
        done();
      }, function () {
        window.alert('PDF generation hit a snag — usually the header image. Please use the "Print" button as a backup (choose "Save as PDF").');
        done();
      });
    });
  });

  // Share PDF as a real file attachment (no blob: link)
  document.getElementById('share-btn').addEventListener('click', function () {
    var btn = this;
    var fileName = buildFileName();
    withBusy(btn, function (done) {
      generatePdf(function (pdf) {
        var blob = pdf.output('blob');
        var file = new File([blob], fileName, { type: 'application/pdf' });

        // Use Web Share API with FILES only (no url -> no blob link in the message)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({
            files: [file],
            title: fileName.replace('.pdf', '')
            // intentionally NO 'url' and NO 'text' so nothing extra is attached
          }).catch(function () {
            /* user cancelled the share sheet - nothing to do */
          }).then(function () { done(); });
        } else {
          // Desktop / unsupported: fall back to a normal download
          pdf.save(fileName);
          window.alert('Direct sharing isn’t supported on this device, so the PDF was downloaded instead. You can attach it to your message manually.');
          done();
        }
      }, function () {
        window.alert('PDF generation hit a snag — usually the header image. Please use the "Print" button as a backup (choose "Save as PDF").');
        done();
      });
    });
  });

  createRow('Protea Photo - Framed (LH2505000003)', 1, 1850);
})();
</script>
